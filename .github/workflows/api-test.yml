name: API tests

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - '.github/workflows/api-test.yml'
  pull_request:
    paths:
      - 'api/**'
      - '.github/workflows/api-test.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: api unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: api
        run: npm ci

      - name: Run unit tests
        working-directory: api
        run: npm test -- --runInBand
# ci-trigger: tooling PRs (no api/** changes) reach this workflow via the path filter on this file. See PR #80.
# touch: PR-4 webhook coming-soon state (path-filter retrigger)
